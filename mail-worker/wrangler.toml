name = "cloud-mail"
main = "src/index.js"
compatibility_date = "2025-06-04"
keep_vars = true

[observability]
enabled = true

[[d1_databases]]
binding = "db"
database_name = "cloud-mail"
database_id = "4b0189b0-bde6-4563-a9df-c37198ab21d0"

[[kv_namespaces]]
binding = "kv"
id = "bdc1e7bc25c34a76817747b0ea95f602"

[[r2_buckets]]
binding = "r2"
bucket_name = "cloud-mail"

[[durable_objects.bindings]]
name = "USER_MAIL_HUB"
class_name = "UserMailHub"

[exports.UserMailHub]
type = "durable-object"
storage = "sqlite"

#[[send_email]]
#name = "email"			#CF发件, 配置后优先使用

[ai]
binding = "ai"

[assets]
binding = "assets"		#静态资源绑定名默认不可修改
directory = "./dist"	#前端vue项目打包的静态资源存放位置,默认dist
not_found_handling = "single-page-application"
run_worker_first = true

[triggers]
crons = ["0 16 * * *"]	#每天晚上12点执行每日任务,刷新分析缓存


[vars]
#ai_model = ""			#ai模型,不填默认使用@cf/meta/llama-3.1-8b-instruct
#analysis_cache = false			#是否开启分析数据缓存
#orm_log = false			#是否sql日志
#domain = []				#邮件域名可可配置多个 示例: ["example1.com","example2.com"]
#admin = ""				#管理员的邮箱	示例: admin@example.com
#jwt_secret = ""			#jwt令牌的密钥,随便填一串字符串

[build]
command = "pnpm --prefix ../mail-vue install && pnpm --prefix ../mail-vue run build"
